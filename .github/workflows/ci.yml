name: CI

# Runs the exact same commands the README tells a human to run locally
# (`docker compose up` / `docker compose exec app php tests/test.php`), just
# automated. No separate CI-only Dockerfile or image — if this passes, the
# same container definition works for whoever clones the repo.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build the app image
        run: docker compose build

      - name: Run test suite
        run: docker compose run --rm app php tests/test.php
